name: Deploy to EC2 with Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Connect to EC2 and deploy
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Go to home directory
          cd /home/ubuntu

          # Clone repo if not exists
          if [ ! -d "Setup" ]; then
            git clone https://github.com/Dhyeypatel55/Setup.git
          fi

          cd Setup

          # Pull latest code
          git pull origin main

          # Stop old container
          docker stop site || true
          docker rm site || true

          # Remove old image (optional)
          docker rmi my-static-site || true

          # Build new Docker image
          docker build -t my-static-site .

          # Run new container
          docker run -d -p 80:80 --name site my-static-site